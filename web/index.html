<!DOCTYPE html>
<html>
<header>
    <title>Monolith</title>
</header>
<body>
    <script type="module">
        import { print } from './prelude.js';

        const heapMemory = new WebAssembly.Memory({
            initial: 1
        });

        const prelude = {
            print: print(heapMemory.buffer)
        }

        WebAssembly.instantiateStreaming(fetch("./code.wasm"), {
            memory: { heap: heapMemory },
            prelude
        });
    </script>
</body>
</html>
